---
- name: Configure Grafana Data Source and Dashboard
  hosts: master
  become: true
  tasks:
    - name: Create datasources provisioning directory
      file:
        path: /etc/grafana/provisioning/datasources
        state: directory
        mode: '0755'

    - name: Create dashboards provisioning directory
      file:
        path: /etc/grafana/provisioning/dashboards
        state: directory
        mode: '0755'

    - name: Create local dashboards directory
      file:
        path: /var/lib/grafana/dashboards
        state: directory
        mode: '0755'

    - name: Provision Prometheus Data Source
      copy:
        dest: /etc/grafana/provisioning/datasources/prometheus.yaml
        content: |
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              access: proxy
              url: http://localhost:9090
              isDefault: true
              editable: true

    - name: Provision Dashboard Provider
      copy:
        dest: /etc/grafana/provisioning/dashboards/default.yaml
        content: |
          apiVersion: 1
          providers:
            - name: 'default'
              orgId: 1
              folder: ''
              type: file
              disableDeletion: false
              updateIntervalSeconds: 10
              options:
                path: /var/lib/grafana/dashboards

    - name: Download Dashboard 1860
      shell: curl -s https://grafana.com/api/dashboards/1860/revisions/latest/download | sed 's/${DS_PROMETHEUS}/Prometheus/g' > /var/lib/grafana/dashboards/node-exporter-full.json

    - name: Restart Grafana service
      shell: systemctl restart grafana-server
