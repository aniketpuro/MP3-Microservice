global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'ec2-nodes'
    static_configs:
      - targets: ['172.31.13.48:9100']
        labels:
          service_name: 'Worker-Node-1'
          env: 'production'
      - targets: ['172.31.21.194:9100']
        labels:
          service_name: 'Worker-Node-2'
          env: 'production'
      - targets: ['172.31.90.227:9100']
        labels:
          service_name: 'Worker-Node-3'
          env: 'production'
      - targets: ['172.31.41.138:9100']
        labels:
          service_name: 'Worker-Node-4'
          env: 'production'
      - targets: ['172.31.7.202:9100']
        labels:
          service_name: 'Controller-Node'
          env: 'production'
